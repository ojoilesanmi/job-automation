name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      SECURITY_SCANS_ENABLED: 'false'
      NVD_API_KEY_ENC: ENC(9ZgoU7wwWDOI/UvtuCOc5Rgv6ZRsGSbx84N9bHscEI/lnjlIBeu0pS+XrBpGwWmcd/tVcKH3SawTYesBsf39dClvBpG1Wek8kooZTxX65as=)
    steps:
      - uses: actions/checkout@v5

      - name: Security scans temporarily disabled
        if: env.SECURITY_SCANS_ENABLED != 'true'
        run: echo "Trivy and OWASP Dependency-Check are temporarily disabled. Set SECURITY_SCANS_ENABLED to true to re-enable."

      - name: Set up JDK 21
        if: env.SECURITY_SCANS_ENABLED == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache security scanner data
        if: env.SECURITY_SCANS_ENABLED == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/trivy
            ~/.dependency-check
          key: security-scanners-${{ runner.os }}-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            security-scanners-${{ runner.os }}-

      - name: Warm Maven dependency cache
        if: env.SECURITY_SCANS_ENABLED == 'true'
        working-directory: backend
        run: mvn -B -DskipTests dependency:go-offline dependency:resolve

      - name: Compile encryption helper
        if: env.SECURITY_SCANS_ENABLED == 'true'
        working-directory: backend
        run: mvn -B -DskipTests compile

      - name: Decrypt NVD API key
        if: env.SECURITY_SCANS_ENABLED == 'true'
        working-directory: backend
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          if [ -z "$ENCRYPTION_KEY" ]; then
            echo "ENCRYPTION_KEY GitHub secret is required to decrypt NVD_API_KEY_ENC"
            exit 1
          fi

          NVD_API_KEY=$(java -cp target/classes com.jobagent.security.EncryptionTool decrypt "$NVD_API_KEY_ENC")
          echo "::add-mask::$NVD_API_KEY"
          echo "NVD_API_KEY=$NVD_API_KEY" >> "$GITHUB_ENV"

      - name: Run Trivy report
        if: env.SECURITY_SCANS_ENABLED == 'true'
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -v "$HOME/.cache/trivy:/root/.cache/trivy" \
            aquasec/trivy:0.58.2 fs /workspace/backend \
            --scanners secret,misconfig \
            --severity HIGH,CRITICAL \
            --format table \
            --exit-code 0

      - name: Generate Trivy SARIF
        if: env.SECURITY_SCANS_ENABLED == 'true' && always()
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -v "$HOME/.cache/trivy:/root/.cache/trivy" \
            aquasec/trivy:0.58.2 fs /workspace/backend \
            --scanners secret,misconfig \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output /workspace/trivy-results.sarif \
            --exit-code 0

      - name: Enforce Trivy findings
        if: env.SECURITY_SCANS_ENABLED == 'true'
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -v "$HOME/.cache/trivy:/root/.cache/trivy" \
            aquasec/trivy:0.58.2 fs /workspace/backend \
            --scanners secret,misconfig \
            --severity HIGH,CRITICAL \
            --format table \
            --exit-code 1

      - name: Upload Trivy results to GitHub Security
        if: env.SECURITY_SCANS_ENABLED == 'true' && always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run OWASP Dependency-Check
        if: env.SECURITY_SCANS_ENABLED == 'true'
        working-directory: backend
        run: |
          mvn -B org.owasp:dependency-check-maven:12.1.0:check \
            -Dformat=ALL \
            -DsuppressionFile=owasp-suppression.xml \
            -DdataDirectory=$HOME/.dependency-check \
            -DnvdApiKey=$NVD_API_KEY \
            -DossindexAnalyzerEnabled=false \
            -DfailBuildOnCVSS=7 \
            -DskipTestScope=true

      - name: Upload OWASP Dependency-Check SARIF
        if: env.SECURITY_SCANS_ENABLED == 'true' && always() && hashFiles('backend/target/dependency-check-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'backend/target/dependency-check-report.sarif'

  build-and-test:
    runs-on: ubuntu-latest
    needs: security-scan
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: jobagent_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/jobagent_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          JWT_SECRET: ci-test-secret-key-for-testing-only
        run: |
          mvn clean package -q -DskipTests
          mvn test -Dtest='!*IntegrationTest'

      - name: Upload JAR
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v5

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here
          # Example: docker-compose -f docker-compose.staging.yml up -d

      - name: Run smoke tests
        if: ${{ vars.STAGING_URL != '' }}
        run: |
          chmod +x scripts/smoke-test.sh
          BASE_URL="${{ vars.STAGING_URL }}" ./scripts/smoke-test.sh

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add your production deployment commands here
          # Example: docker-compose -f docker-compose.prod.yml up -d

      - name: Run smoke tests
        if: ${{ vars.PRODUCTION_URL != '' }}
        run: |
          chmod +x scripts/smoke-test.sh
          BASE_URL="${{ vars.PRODUCTION_URL }}" ./scripts/smoke-test.sh
