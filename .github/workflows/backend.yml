name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Warm Maven dependency cache
        working-directory: backend
        run: mvn -B -DskipTests dependency:go-offline dependency:resolve

      - name: Run Trivy secret and misconfiguration scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'backend/'
          scanners: 'secret,misconfig'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run OWASP Dependency-Check
        working-directory: backend
        run: |
          mvn -B org.owasp:dependency-check-maven:12.1.0:check \
            -Dformat=ALL \
            -DsuppressionFile=owasp-suppression.xml \
            -DfailBuildOnCVSS=7 \
            -DskipTestScope=true

      - name: Upload OWASP Dependency-Check SARIF
        if: always() && hashFiles('backend/target/dependency-check-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'backend/target/dependency-check-report.sarif'

  build-and-test:
    runs-on: ubuntu-latest
    needs: security-scan
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: jobagent_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/jobagent_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          JWT_SECRET: ci-test-secret-key-for-testing-only
        run: |
          mvn clean package -q -DskipTests
          mvn test -Dtest='!*IntegrationTest'

      - name: Upload JAR
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v5

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here
          # Example: docker-compose -f docker-compose.staging.yml up -d

      - name: Run smoke tests
        if: ${{ vars.STAGING_URL != '' }}
        run: |
          chmod +x scripts/smoke-test.sh
          BASE_URL="${{ vars.STAGING_URL }}" ./scripts/smoke-test.sh

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add your production deployment commands here
          # Example: docker-compose -f docker-compose.prod.yml up -d

      - name: Run smoke tests
        if: ${{ vars.PRODUCTION_URL != '' }}
        run: |
          chmod +x scripts/smoke-test.sh
          BASE_URL="${{ vars.PRODUCTION_URL }}" ./scripts/smoke-test.sh
