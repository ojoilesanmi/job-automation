spring.application.name=job-application-agent

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:jobagent}
spring.datasource.username=${DB_USERNAME:jobagent}
spring.datasource.password=${DB_PASSWORD:jobagent_secret}

# Redis
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:jobagent}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:jobagent_secret}

# JWT
jwt.secret=${JWT_SECRET:change-this-to-a-secure-random-string-in-production}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# AI Service
app.ai-service.url=${AI_SERVICE_URL:http://ai-service:8000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
