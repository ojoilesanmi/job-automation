spring.application.name=job-application-agent

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jobagent}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:jobagent}
spring.datasource.password=${DB_PASSWORD:jobagent_secret}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:jobagent}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:jobagent_secret}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Application
app.storage.local-path=./uploads
app.upload.dir=${UPLOAD_DIR:uploads/cvs}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.ai-service.url=${AI_SERVICE_URL:http://localhost:8000}
app.ai-service.api-key=${AI_SERVICE_API_KEY:}
app.auto-apply.enabled=${AUTO_APPLY_ENABLED:false}
app.queue.submission.enabled=${QUEUE_SUBMISSION_ENABLED:false}

# Actuator + Metrics
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=job-application-agent

# OpenTelemetry
management.otel.tracing.endpoint=${OTEL_ENDPOINT:http://localhost:4318}
management.tracing.sampling.probability=${OTEL_SAMPLE_RATE:1.0}

# Logging
logging.level.com.jobagent=INFO
logging.level.com.jobagent.config=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId:-}] %-5level %logger{36} - %msg%n

# File Storage
app.storage.type=${STORAGE_TYPE:local}
app.storage.local.base-path=${STORAGE_LOCAL_PATH:./uploads}
app.storage.s3.bucket=${S3_BUCKET:}
app.storage.s3.region=${S3_REGION:us-east-1}
app.storage.s3.endpoint=${S3_ENDPOINT:}
app.storage.s3.access-key=${S3_ACCESS_KEY:}
app.storage.s3.secret-key=${S3_SECRET_KEY:}

# Gmail Integration
app.gmail.enabled=${GMAIL_ENABLED:false}
app.gmail.credentials-path=${GMAIL_CREDENTIALS_PATH:}
app.gmail.token-path=${GMAIL_TOKEN_PATH:./tokens}
app.gmail.redirect-uri=${GMAIL_REDIRECT_URI:http://localhost:8080/api/v1/gmail/callback}

# Embeddings
app.embeddings.enabled=${EMBEDDINGS_ENABLED:false}
app.embeddings.model=${EMBEDDINGS_MODEL:text-embedding-3-small}
app.embeddings.dimension=${EMBEDDINGS_DIMENSION:1536}

# Application Statuses
app.application.allowed-transitions=discovered,shortlisted,pending_approval,approved,submitted,viewed,interview,assessment,offer,accepted,rejected,no_response,follow_up_needed,withdrawn

# Mail
app.mail.from=${MAIL_FROM:noreply@jobagent.com}
app.mail.frontend-url=${MAIL_FRONTEND_URL:http://localhost:3002}
app.password-reset.token-expiry-hours=${PASSWORD_RESET_TOKEN_EXPIRY_HOURS:1}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
